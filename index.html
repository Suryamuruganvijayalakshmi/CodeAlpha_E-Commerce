<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCart - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="logo">🛒 ShopCart</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#products">Products</a></li>
      <li>
        <a href="cart.html" class="cart-icon">
          Cart
          <span class="cart-count" id="cart-count" style="display:none;">0</span>
        </a>
      </li>
      <li><a href="login.html" id="login-nav-link">Login</a></li>
    </ul>
  </nav>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero">
    <h1>Welcome to ShopCart 🛍️</h1>
    <p>Find the best tech accessories at student-friendly prices</p>
    <a href="#products" class="btn">Shop Now</a>
  </section>

  <!-- ===== PRODUCTS SECTION ===== -->
  <section class="products-section" id="products">
    <h2 class="section-title">Our Products</h2>

    <!-- Product cards are generated by JavaScript below -->
    <div class="product-grid" id="product-grid">
      <!-- Cards will appear here -->
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2025 ShopCart. Made with ❤️ by a CSE Student.</p>
  </footer>

  <!-- Toast notification popup -->
  <div class="toast" id="toast"></div>

  <!-- Load our script -->
  <script src="script.js"></script>

  <script>
    // ===== BUILD PRODUCT CARDS FROM PRODUCTS ARRAY =====
    function renderProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = ''; // Clear before rendering

      products.forEach(function(product) {
        // Create one card div for each product
        const card = document.createElement('div');
        card.className = 'product-card';

        card.innerHTML = `
          <div class="product-img-placeholder">${product.emoji}</div>
          <h3>${product.name}</h3>
          <p class="product-desc">${product.desc}</p>
          <div class="product-price">₹${product.price.toLocaleString()}</div>
          <div class="card-buttons">
            <button class="btn btn-outline" onclick="goToDetails(${product.id})">Details</button>
            <button class="btn" onclick="addToCart(${product.id}, 1)">Add to Cart</button>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // Go to product details page with product id in URL
    function goToDetails(id) {
      window.location.href = 'product-details.html?id=' + id;
    }

    // Run on page load
    renderProducts();
  </script>

</body>
</html>
