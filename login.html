<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopCart | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- main navigation for login page -->
  <header class="site-header">
    <div class="container nav-container">
      <a href="index.html" class="logo">ShopCart</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="index.html#products">Products</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <!-- auth hero banner -->
  <section class="auth-hero">
    <div class="container">
      <h1>Welcome Back</h1>
      <p>Sign in to your account or create a new one to get started</p>
    </div>
  </section>

  <!-- login and register section -->
  <section class="auth-section">
    <div class="container auth-wrapper">
      <div class="auth-box">
        <div class="auth-tabs">
          <button id="tab-login" class="tab-button active" type="button">Login</button>
          <button id="tab-register" class="tab-button" type="button">Register</button>
        </div>
        <div id="auth-message" class="message"></div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input id="login-email" type="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary auth-submit">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input id="register-name" type="text" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input id="register-email" type="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input id="register-password" type="password" placeholder="Create a password" required>
          </div>
          <div class="form-group">
            <label for="register-confirm-password">Confirm Password</label>
            <input id="register-confirm-password" type="password" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-primary auth-submit">Register</button>
        </form>
      </div>
    </div>
  </section>

  <script src="script.js" defer></script>
</body>
</html>
